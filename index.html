<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Metronome</h1>

    <!-- Beat indicators -->
    <div class="beat-row" id="beat-row">
      <div class="beat-dot accent" data-beat="0"></div>
      <div class="beat-dot" data-beat="1"></div>
      <div class="beat-dot" data-beat="2"></div>
      <div class="beat-dot" data-beat="3"></div>
    </div>

    <div id="light" class="light"></div>

    <div class="bpm-display">
      <button class="bpm-nudge" id="bpm-minus" aria-label="Decrease BPM">−</button>
      <span id="bpm-value">120</span> BPM
      <button class="bpm-nudge" id="bpm-plus" aria-label="Increase BPM">+</button>
    </div>

    <input type="range" id="bpm-slider" min="30" max="240" value="120" aria-label="BPM">

    <!-- Tempo presets -->
    <div class="option-group">
      <label>Tempo</label>
      <div class="options">
        <button class="opt tempo" data-bpm="60">Largo</button>
        <button class="opt tempo" data-bpm="90">Andante</button>
        <button class="opt tempo selected" data-bpm="120">Allegro</button>
        <button class="opt tempo" data-bpm="160">Vivace</button>
        <button class="opt tempo" data-bpm="200">Presto</button>
      </div>
    </div>

    <!-- Time signature -->
    <div class="option-group">
      <label>Time Signature</label>
      <div class="options">
        <button class="opt ts" data-ts="2" aria-label="2/4 time">2/4</button>
        <button class="opt ts" data-ts="3" aria-label="3/4 time">3/4</button>
        <button class="opt ts selected" data-ts="4" aria-label="4/4 time">4/4</button>
        <button class="opt ts" data-ts="6" aria-label="6/8 time">6/8</button>
      </div>
    </div>

    <div class="option-group">
      <label>Light</label>
      <div class="options">
        <button class="opt selected" data-light="red" style="--c:#ff4444" aria-label="Red light"></button>
        <button class="opt" data-light="cyan" style="--c:#00e5ff" aria-label="Cyan light"></button>
        <button class="opt" data-light="gold" style="--c:#ffd600" aria-label="Gold light"></button>
        <button class="opt" data-light="lime" style="--c:#76ff03" aria-label="Lime light"></button>
      </div>
    </div>

    <div class="option-group">
      <label>Sound</label>
      <div class="options">
        <button class="opt selected" data-sound="click" aria-label="Click sound">Click</button>
        <button class="opt" data-sound="beep" aria-label="Beep sound">Beep</button>
        <button class="opt" data-sound="wood" aria-label="Wood sound">Wood</button>
        <button class="opt" data-sound="hi-hat" aria-label="Hi-hat sound">Hi-hat</button>
      </div>
    </div>

    <button id="start-btn" class="start-btn" aria-label="Start or stop metronome">Start</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
