<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronome</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
  <div class="app">
    <div class="top-bar">
      <h1>Metronome</h1>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">☀️</button>
    </div>

    <!-- Beat indicators -->
    <div class="beat-row" id="beat-row">
      <div class="beat-dot accent" data-beat="0"></div>
      <div class="beat-dot" data-beat="1"></div>
      <div class="beat-dot" data-beat="2"></div>
      <div class="beat-dot" data-beat="3"></div>
    </div>

    <div id="light" class="light"></div>

    <div class="bpm-display">
      <button class="bpm-nudge" id="bpm-minus" aria-label="Decrease BPM">−</button>
      <span id="bpm-value">120</span> BPM
      <button class="bpm-nudge" id="bpm-plus" aria-label="Increase BPM">+</button>
    </div>

    <input type="range" id="bpm-slider" min="30" max="240" value="120" aria-label="BPM">

    <!-- Time signature -->
    <div class="option-group">
      <label>Time Signature</label>
      <div class="options">
        <button class="opt ts" data-ts="2">2/4</button>
        <button class="opt ts" data-ts="3">3/4</button>
        <button class="opt ts selected" data-ts="4">4/4</button>
        <button class="opt ts" data-ts="6">6/8</button>
      </div>
    </div>

    <!-- Accent mode -->
    <div class="option-group">
      <label>First Beat</label>
      <div class="options">
        <button class="opt accent-opt selected" data-accent="on">Accented</button>
        <button class="opt accent-opt" data-accent="off">Equal</button>
      </div>
    </div>

    <div class="option-group">
      <label>Light</label>
      <div class="options">
        <button class="opt selected" data-light="red" style="--c:#ff4444" aria-label="Red light"></button>
        <button class="opt" data-light="cyan" style="--c:#00e5ff" aria-label="Cyan light"></button>
        <button class="opt" data-light="gold" style="--c:#ffd600" aria-label="Gold light"></button>
        <button class="opt" data-light="lime" style="--c:#76ff03" aria-label="Lime light"></button>
      </div>
    </div>

    <div class="option-group">
      <label>Sound</label>
      <div class="options">
        <button class="opt selected" data-sound="pulse" aria-label="Pulse sound">Pulse</button>
        <button class="opt" data-sound="click" aria-label="Click sound">Click</button>
        <button class="opt" data-sound="snap" aria-label="Snap sound">Snap</button>
        <button class="opt" data-sound="beep" aria-label="Beep sound">Beep</button>
        <button class="opt" data-sound="knock" aria-label="Knock sound">Knock</button>
      </div>
    </div>

    <button id="start-btn" class="start-btn" aria-label="Start or stop metronome">Start</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
